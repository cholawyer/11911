<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>오늘의 법률 운세</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta property="og:title" content="오늘의 법률 운세 🌙">
<meta property="og:description" content="타로 카드로 알아보는 오늘의 법률 위험도">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0a0e1a;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardGlow{0%,100%{box-shadow:0 0 20px rgba(255,215,0,.15)}50%{box-shadow:0 0 40px rgba(255,215,0,.3)}}
@keyframes moonPulse{0%,100%{filter:drop-shadow(0 0 15px rgba(255,215,0,.4))}50%{filter:drop-shadow(0 0 30px rgba(255,215,0,.7))}}
@keyframes burstGlow{0%{box-shadow:0 0 0 0 rgba(255,215,0,.6)}50%{box-shadow:0 0 30px 10px rgba(255,215,0,.4),0 0 60px 20px rgba(255,215,0,.15)}100%{box-shadow:0 0 15px 2px rgba(255,215,0,.2)}}
@keyframes burstScale{0%{transform:rotateY(180deg) scale(1)}30%{transform:rotateY(180deg) scale(1.12)}60%{transform:rotateY(180deg) scale(0.97)}100%{transform:rotateY(180deg) scale(1)}}
@keyframes goldBurst{0%{box-shadow:0 0 0 0 rgba(255,215,0,.8)}30%{box-shadow:0 0 50px 20px rgba(255,215,0,.6),0 0 80px 40px rgba(255,180,0,.3),0 0 120px 60px rgba(255,255,200,.1)}100%{box-shadow:0 0 25px 5px rgba(255,215,0,.35)}}
@keyframes goldScale{0%{transform:rotateY(180deg) scale(1)}15%{transform:rotateY(180deg) scale(1.2)}30%{transform:rotateY(180deg) scale(0.95)}45%{transform:rotateY(180deg) scale(1.1)}60%{transform:rotateY(180deg) scale(0.98)}100%{transform:rotateY(180deg) scale(1)}}
@keyframes goldShimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes goldParticle{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes rainbowBorder{0%{border-color:rgba(255,215,0,.8)}50%{border-color:rgba(255,220,100,.8)}100%{border-color:rgba(255,215,0,.8)}}
@keyframes luckyPulse{0%,100%{text-shadow:0 0 10px rgba(255,215,0,.5)}50%{text-shadow:0 0 25px rgba(255,215,0,.9),0 0 50px rgba(255,180,0,.4)}}
@keyframes cardShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px)}20%{transform:translateX(4px)}30%{transform:translateX(-4px)}40%{transform:translateX(4px)}50%{transform:translateX(-2px)}60%{transform:translateX(2px)}70%{transform:translateX(-2px)}80%{transform:translateX(2px)}90%{transform:translateX(-1px)}}
@keyframes mentFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.wrap{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#141b2e 0%,#0a0e1a 70%);padding:40px 20px 60px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite;opacity:.3}
.moon{width:60px;height:60px;margin-bottom:8px;animation:moonPulse 4s ease-in-out infinite}
.moon svg{width:100%;height:100%}
.title{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#fef3c7,#fcd34d,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px;letter-spacing:-0.5px}
.subtitle{font-size:14px;color:#64748b;text-align:center;margin-bottom:32px;font-weight:500}
.card-spread{display:flex;gap:16px;justify-content:center;margin-bottom:24px;perspective:1000px}
.tarot-card{width:100px;height:156px;border-radius:12px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(.4,.2,.2,1);will-change:transform}
.tarot-card.shaking{animation:cardShake 0.6s ease-in-out}
.tarot-card.flipped{transform:rotateY(180deg);cursor:default}
.tarot-card.burst{animation:burstScale .6s ease-out forwards,burstGlow .8s ease-out}
.tarot-card.gold-burst{animation:goldScale .9s ease-out forwards,goldBurst 1.2s ease-out}
.tarot-card.not-chosen{opacity:.4;transform:scale(.92);pointer-events:none;transition:all 0.5s}
.card-face{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card-back{background:linear-gradient(145deg,#1a1f3a,#0f1328);border:1.5px solid rgba(255,215,0,.25);animation:cardGlow 3s ease-in-out infinite}
.card-back-inner{width:70%;height:78%;border:1px solid rgba(255,215,0,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(255,215,0,.06) 0%,transparent 70%)}
.card-back-symbol{font-size:28px;color:rgba(255,215,0,.5);font-family:'Noto Serif KR',serif;font-weight:900}
.card-front{transform:rotateY(180deg);background:linear-gradient(145deg,#1a1f3a,#141830);border:1.5px solid rgba(255,215,0,.35);padding:12px 8px;text-align:center;gap:6px}
.card-front .card-emoji{font-size:36px;margin-bottom:2px}
.card-front .card-name{font-family:'Noto Serif KR',serif;font-size:12px;font-weight:700;color:#fcd34d;line-height:1.3}
.card-front .card-num{font-size:10px;color:rgba(255,215,0,.4);font-weight:700;position:absolute;top:8px;left:10px}
.tarot-card.is-gold .card-front{background:linear-gradient(145deg,#2a2000,#1a1500,#2a2000);border:2px solid rgba(255,215,0,.8);animation:rainbowBorder 2s linear infinite;overflow:hidden}
.tarot-card.is-gold .card-front::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,215,0,.15) 45%,rgba(255,255,200,.25) 50%,rgba(255,215,0,.15) 55%,transparent 70%);background-size:200% 100%;animation:goldShimmer 2s linear infinite;border-radius:12px}
.tarot-card.is-gold .card-front .card-name{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.5)}
.gold-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:800;color:#ffd700;letter-spacing:2px;text-shadow:0 0 6px rgba(255,215,0,.6);background:rgba(255,215,0,.1);padding:2px 8px;border-radius:4px}
.particles{position:fixed;left:0;top:0;width:100vw;height:100vh;pointer-events:none;z-index:10}
.particle{position:absolute;width:6px;height:6px;border-radius:50%;animation:goldParticle 1s ease-out forwards}
.screen-flash{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0;transition:opacity .1s}
.prompt{font-size:14px;color:#94a3b8;text-align:center;animation:float 3s ease-in-out infinite;margin-bottom:12px;font-weight:500}
.prompt span{color:#fcd34d}
.loading-overlay{position:fixed;inset:0;background:rgba(10,14,26,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.loading-overlay.show{opacity:1;pointer-events:auto}
.loading-text{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:#fcd34d;animation:float 1s ease-in-out infinite;margin-top:16px}
.loading-dots{display:flex;gap:8px;margin-top:12px}
.loading-dot{width:10px;height:10px;border-radius:50%;background:#fbbf24;animation:twinkle 0.6s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
.result{width:100%;max-width:400px;animation:fadeUp .6s ease-out}
.result-header{text-align:center;margin-bottom:20px}
.result-card-name{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:900;color:#fcd34d;margin-bottom:2px}
.result-card-name.gold-name{color:#ffd700;animation:luckyPulse 2s ease-in-out infinite}
.result-card-sub{font-size:13px;color:#94a3b8;font-weight:500}
.ment-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 16px;margin-bottom:16px;text-align:center;animation:mentFadeIn .6s ease-out}
.ment-text{font-size:14px;color:#e2e8f0;line-height:1.7;font-weight:500}
.ment-box.gold-ment{background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.25)}
.ment-box.gold-ment .ment-text{color:#fcd34d}
.gold-banner{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,180,0,.06));border:1px solid rgba(255,215,0,.3);border-radius:14px;padding:16px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.gold-banner::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,215,0,.08) 50%,transparent 70%);background-size:200% 100%;animation:goldShimmer 3s linear infinite}
.gold-banner-emoji{font-size:32px;margin-bottom:6px;display:block;position:relative}
.gold-banner-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:900;color:#ffd700;margin-bottom:4px;position:relative}
.gold-banner-text{font-size:12px;color:#fbbf24;line-height:1.6;position:relative}
.gold-banner-rare{font-size:10px;color:rgba(255,215,0,.5);margin-top:6px;position:relative}
.result-message{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:16px}
.result-quote{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:#e2e8f0;line-height:1.8;text-align:center;margin-bottom:14px;word-break:keep-all}
.result-detail{font-size:13px;color:#94a3b8;line-height:1.8;word-break:keep-all}
.result-law{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px}
.result-law-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.result-law-text{font-size:12px;color:#cbd5e1;line-height:1.7}
.result-law-ref{font-size:11px;color:#fbbf24;font-weight:600;margin-top:4px;display:block}
.result-tip{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:12px;padding:14px 16px;margin-bottom:20px}
.result-tip-title{font-size:12px;font-weight:700;color:#10b981;margin-bottom:6px}
.result-tip-text{font-size:12px;color:#94a3b8;line-height:1.7}
.danger-meter{margin-bottom:20px}
.danger-label{display:flex;justify-content:space-between;margin-bottom:6px}
.danger-label span{font-size:11px;font-weight:600}
.danger-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.danger-fill{height:100%;border-radius:3px;transition:width 1s ease-out}
.btn-cta{display:block;width:100%;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;text-decoration:none;text-align:center;padding:13px 0;border-radius:14px;font-size:15px;font-weight:800;border:none;cursor:pointer;margin-bottom:8px}
.btn-phone{display:block;width:100%;background:rgba(16,185,129,.08);color:#10b981;text-decoration:none;text-align:center;padding:11px 0;border-radius:14px;font-size:14px;font-weight:700;border:1px solid rgba(16,185,129,.25);margin-bottom:8px}
.btn-share{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:rgba(255,255,255,.04);color:#94a3b8;text-align:center;padding:11px 0;border-radius:14px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.08);cursor:pointer;margin-bottom:8px;transition:all .2s}
.btn-share:hover{background:rgba(255,255,255,.08);color:#e2e8f0}
.btn-retry{background:transparent;color:#64748b;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:9px 24px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-retry:hover{color:#94a3b8;border-color:rgba(255,255,255,.15)}
.footer{font-size:10px;color:#334155;text-align:center;margin-top:20px;line-height:1.6}
.footer-lawyer{font-size:11px;color:#475569;text-align:center;margin-top:8px}
.collection{font-size:11px;color:#64748b;text-align:center;margin-top:12px;padding:8px 16px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid rgba(255,255,255,.05)}
.collection strong{color:#fbbf24}
@media(max-width:380px){.tarot-card{width:88px;height:138px}.title{font-size:24px}.card-spread{gap:10px}}
</style>
</head>

<div class="screen-flash" id="screen-flash"></div>

  <div class="loading-text">카드를 읽고 있습니다...</div>
  <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
</div>

var GOLD_RATE=0.10;
var app=document.getElementById("app");
var chosenCard=null,flippedIndex=-1,isGold=false,todayDeck=[],duguduguRef=null;

function init(){chosenCard=null;flippedIndex=-1;isGold=false;todayDeck=pickThree();renderStars();renderMain()}
function pickThree(){var s=new Date().toDateString(),h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h}var sh=CARDS.slice().sort(function(a,b){return((h*(a.id+1)*13)%97)-((h*(b.id+1)*17)%97)});return sh.slice(0,3)}
function renderStars(){var e=app.querySelectorAll(".star");for(var i=0;i<e.length;i++)e[i].remove();for(var i=0;i<50;i++){var s=document.createElement("div");s.className="star";s.style.left=(Math.random()*100)+"%";s.style.top=(Math.random()*100)+"%";s.style.setProperty("--d",(2+Math.random()*4)+"s");s.style.animationDelay=(Math.random()*3)+"s";if(Math.random()>0.7){s.style.width="3px";s.style.height="3px"}app.appendChild(s)}}

function spawnParticles(el){var r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;var c=document.createElement("div");c.className="particles";document.body.appendChild(c);var colors=["#ffd700","#ffec80","#fff5cc","#ffb800","#ffe066"];for(var i=0;i<24;i++){var p=document.createElement("div");p.className="particle";var a=(Math.PI*2/24)*i+(Math.random()-0.5)*0.5,d=60+Math.random()*80;p.style.left=cx+"px";p.style.top=cy+"px";p.style.setProperty("--tx",(Math.cos(a)*d)+"px");p.style.setProperty("--ty",(Math.sin(a)*d)+"px");p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.width=(4+Math.random()*6)+"px";p.style.height=p.style.width;p.style.animationDuration=(0.6+Math.random()*0.6)+"s";p.style.animationDelay=(Math.random()*0.2)+"s";c.appendChild(p)}setTimeout(function(){c.remove()},2000)}
function screenFlash(color){var f=document.getElementById("screen-flash");f.style.background=color;f.style.opacity="0.3";setTimeout(function(){f.style.opacity="0"},150)}
function showLoading(){document.getElementById("loading-overlay").classList.add("show")}
function hideLoading(){document.getElementById("loading-overlay").classList.remove("show")}

function renderMain(){
  var h="";
  h+='<div class="moon"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="mg" cx="40%" cy="40%"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fbbf24"/></radialGradient></defs><circle cx="50" cy="50" r="38" fill="url(#mg)" opacity=".9"/><circle cx="65" cy="50" r="30" fill="#0a0e1a" opacity=".85"/></svg></div>';
  h+='<h1 class="title">오늘의 법률 운세</h1>';
  h+='<p class="subtitle">카드 한 장으로 알아보는 법률 위험도</p>';
  h+='<div class="card-spread" id="card-spread">';
  for(var i=0;i<3;i++){var c=todayDeck[i];h+='<div class="tarot-card" id="card-'+i+'" onclick="flipCard('+i+')"><div class="card-face card-back"><div class="card-back-inner"><div class="card-back-symbol">&#9878;</div></div></div><div class="card-face card-front"><span class="card-num">'+c.num+'</span><span class="card-emoji">'+c.emoji+'</span><span class="card-name">'+c.name+'</span></div></div>'}
  h+='</div>';
  h+='<p class="prompt">카드를 <span>한 장</span> 선택하세요</p>';
  h+='<div id="result-area"></div>';
  h+='<p class="footer-lawyer">조장현 변호사 | 전직 영장전담 부장판사</p>';
  h+='<p class="footer">※ 본 콘텐츠는 법률 조언이 아닙니다.<br>실제 사건 대처는 변호사 상담이 필요합니다.</p>';
  var stars=app.querySelectorAll(".star");app.innerHTML="";for(var i=0;i<stars.length;i++)app.appendChild(stars[i]);
  var d=document.createElement("div");d.innerHTML=h;while(d.firstChild)app.appendChild(d.firstChild);
}

function flipCard(index){
  if(flippedIndex>=0)return;
  flippedIndex=index;
  chosenCard=todayDeck[index];
  isGold=(Math.random()<=GOLD_RATE);
  var cardEl=document.getElementById("card-"+index);

  // STEP 1: 뚜쉬 + 진동 + shake
  playSound("tushi");
  vibrate([50,30,80]);
  cardEl.classList.add("shaking");

  var prompt=document.querySelector(".prompt");
  if(prompt)prompt.style.display="none";
  for(var i=0;i<3;i++){if(i!==index)document.getElementById("card-"+i).classList.add("not-chosen")}

  // STEP 2: 두구두구 + 로딩 (0.5s후 시작, 2초간)
  setTimeout(function(){
    showLoading();
    duguduguRef=playSound("dugudugu");
    vibrate([100,50,100,50,100,50,100,50,100,50,100,50,100,50,100,50,100]);
  },500);

  // STEP 3: 개봉 (2.5초 후)
  setTimeout(function(){
    hideLoading();
    stopSound(duguduguRef);
    cardEl.classList.remove("shaking");
    cardEl.classList.add("flipped");

    if(isGold){
      setTimeout(function(){
        cardEl.classList.add("is-gold");
        var front=cardEl.querySelector(".card-front");
        var label=document.createElement("div");label.className="gold-label";label.textContent="\u2605 GOLD \u2605";front.appendChild(label);
        cardEl.classList.add("gold-burst");
        playSound("pilsalgi");
        setTimeout(function(){playSound("areumdaum")},800);
        screenFlash("#ffd700");
        setTimeout(function(){screenFlash("#ffd700")},200);
        setTimeout(function(){screenFlash("#fff8dc")},400);
        spawnParticles(cardEl);
        setTimeout(function(){spawnParticles(cardEl)},400);
        vibrate([100,50,100,50,200,100,300]);
      },600);
      setTimeout(function(){renderResult(chosenCard,true)},2800);
    }else{
      setTimeout(function(){
        cardEl.classList.add("burst");
        playSound("bbangppare");
        screenFlash("#ffd700");
        vibrate([30,20,50]);
      },550);
      setTimeout(function(){renderResult(chosenCard,false)},1400);
    }
  },2500);
}

function renderResult(card,gold){
  var area=document.getElementById("result-area");
  var h='<div class="result">';
  h+='<div class="result-header">';
  if(gold){h+='<div class="result-card-name gold-name">\u2726 '+card.emoji+" "+card.name+' \u2726</div>';h+='<div class="result-card-sub" style="color:#ffd700">\ud83c\udf1f GOLD CARD</div>'}
  else{h+='<div class="result-card-name">'+card.emoji+" "+card.name+'</div>';h+='<div class="result-card-sub">오늘의 법률 운세 제'+card.num+'장</div>'}
  h+='</div>';

  if(gold){
    h+='<div class="ment-box gold-ment"><p class="ment-text">오늘 하루 좋은 일이 생길 것 같네요! \ud83c\udf40<br>어떤 일이 있었는지 꼭 알려주세요 \u2728</p></div>';
    h+='<div class="gold-banner"><span class="gold-banner-emoji">\ud83c\udf89\ud83c\udf1f\ud83c\udf89</span><div class="gold-banner-title">행운의 골드 카드!</div><div class="gold-banner-text">'+card.goldMsg.replace(/\n/g,"<br>")+'</div><div class="gold-banner-rare">출현 확률 0.01%</div></div>';
  }else{
    h+='<div class="ment-box"><p class="ment-text">오늘은 골드카드를 뽑지 못했지만<br>응원할게요! \ud83d\udcaa\ud83d\ude0a</p></div>';
  }

  h+='<div class="danger-meter"><div class="danger-label"><span style="color:#64748b">안전</span><span style="color:'+card.dangerColor+';font-weight:700">위험도 '+card.dangerLabel+'</span></div><div class="danger-bar"><div class="danger-fill" id="danger-fill" style="width:0%;background:'+card.dangerColor+'"></div></div></div>';
  h+='<div class="result-message"><p class="result-quote">'+card.quote.replace(/\n/g,"<br>")+'</p><p class="result-detail">'+card.detail+'</p></div>';
  h+='<div class="result-law"><span class="result-law-icon">\u2696\ufe0f</span><div><span class="result-law-text">'+card.law+'</span><span class="result-law-ref">'+card.lawRef+'</span></div></div>';
  h+='<div class="result-tip"><div class="result-tip-title">\ud83d\udca1 오늘의 법률 팁</div><div class="result-tip-text">'+card.tip+'</div></div>';
  h+='<a href="https://cholawyer.github.io/divine-justice/" target="_blank" class="btn-cta">11911 무료 상담 바로가기</a>';
  h+='<a href="tel:01025020208" class="btn-phone">\ud83d\udcde 010-2502-0208</a>';
  h+='<button class="btn-share" onclick="shareResult()">'+(gold?"\ud83c\udf1f 골드 카드 자랑하기":"\ud83d\udd17 결과 공유하기")+'</button>';
  h+='<div style="text-align:center;margin-top:4px"><button class="btn-retry" onclick="init()">\ud83c\udf19 다시 뽑기</button></div>';
  var ct=gold?'\ud83c\udf1f <strong>GOLD</strong> 카드를 뽑았습니다! 오늘 하루 행운이 함께합니다.':'전체 <strong>'+CARDS.length+'</strong>장의 카드 중 하나를 뽑았습니다. 내일 다시 도전해보세요!';
  h+='<div class="collection">'+ct+'</div></div>';
  area.innerHTML=h;
  setTimeout(function(){var f=document.getElementById("danger-fill");if(f)f.style.width=card.danger+"%"},100);
}

function shareResult(){
  if(!chosenCard)return;
  var gp=isGold?"\ud83c\udf1f [GOLD CARD]\n":"";
  var t=gp+"\ud83c\udf19 오늘의 법률 운세: "+chosenCard.emoji+" "+chosenCard.name+"\n\n"+chosenCard.quote.replace(/\n/g," ")+"\n\n위험도: "+chosenCard.dangerLabel+"\n\n나도 뽑아보기 \ud83d\udc49";
  if(navigator.share){navigator.share({title:"오늘의 법률 운세",text:t}).catch(function(){})}
  else if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){var b=document.querySelector(".btn-share");if(b){var o=b.innerHTML;b.innerHTML="\u2705 복사 완료!";setTimeout(function(){b.innerHTML=o},2000)}})}
}

preloadAudio();
